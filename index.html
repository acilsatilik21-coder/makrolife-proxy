<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emlak Portföyü | Güvenilir Gayrimenkul İlanları</title>
    <!-- Tailwind CSS ve FontAwesome CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <!-- Supabase JS Client -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-slate-50 text-slate-800 font-sans antialiased">

    <!-- 1. Header (Navbar) -->
    <header class="bg-white border-b border-slate-200 sticky top-0 z-50 shadow-sm">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-20 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <!-- Şirket Logosu (Dinamik olarak güncellenebilir) -->
                <img id="companyLogo" src="logo.png" alt="Logo" class="h-12 w-auto object-contain onerror-fallback" onerror="this.src='https://images.unsplash.com/photo-1564013799919-ab600027ffc6?auto=format&fit=crop&w=120&q=80'">
                <span class="font-bold text-lg text-slate-900 tracking-tight hidden sm:inline-block">Gayrimenkul Yatırım</span>
            </div>
            <nav class="flex gap-8 text-sm font-semibold">
                <a href="#" class="text-slate-900 hover:text-amber-600 transition duration-150">Ana Sayfa</a>
                <a href="#" class="text-slate-500 hover:text-slate-900 transition duration-150">Hakkımızda</a>
                <a href="#" class="text-slate-500 hover:text-slate-900 transition duration-150">İletişim</a>
            </nav>
        </div>
    </header>

    <!-- 2. Main Container (Sidebar & Grid) -->
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 flex flex-col lg:flex-row gap-8">
        
        <!-- Sol Filtre Paneli (Left Sidebar) -->
        <aside class="w-full lg:w-64 flex-shrink-0">
            <div class="bg-white p-5 rounded-xl border border-slate-200 shadow-sm sticky top-24">
                <div class="flex items-center gap-2 pb-4 mb-4 border-b border-slate-100">
                    <i class="fa-solid fa-sliders text-slate-900"></i>
                    <h2 class="font-bold text-slate-900 text-sm tracking-wide uppercase">Detaylı Arama</h2>
                </div>
                
                <div class="flex flex-col gap-5">
                    <!-- Kelime ile Arama -->
                    <div>
                        <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2">Arama Kelimesi</label>
                        <div class="relative">
                            <input type="text" id="searchKeyword" onkeyup="fetchListings()" placeholder="İlan no, başlık..." class="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-lg text-xs focus:border-slate-900 focus:bg-white focus:outline-none transition">
                            <i class="fa-solid fa-magnifying-glass absolute right-3 top-3.5 text-slate-400 text-xs"></i>
                        </div>
                    </div>

                    <!-- İlan Durumu (Satılık / Kiralık) -->
                    <div>
                        <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2">Durum</label>
                        <select id="filterProcess" onchange="fetchListings()" class="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-lg text-xs focus:border-slate-900 focus:bg-white focus:outline-none transition">
                            <option value="">Tümü</option>
                            <option value="Satılık">Satılık</option>
                            <option value="Kiralık">Kiralık</option>
                        </select>
                    </div>

                    <!-- Konut Tipi (Daire / Villa / Arsa) -->
                    <div>
                        <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2">Kategori</label>
                        <select id="filterProperty" onchange="fetchListings()" class="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-lg text-xs focus:border-slate-900 focus:bg-white focus:outline-none transition">
                            <option value="">Tümü</option>
                            <option value="Daire">Daire</option>
                            <option value="Villa">Villa</option>
                            <option value="Arsa">Arsa</option>
                        </select>
                    </div>

                    <!-- İlçe Filtresi -->
                    <div>
                        <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2">İlçe</label>
                        <select id="filterDistrict" onchange="fetchListings()" class="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-lg text-xs focus:border-slate-900 focus:bg-white focus:outline-none transition">
                            <option value="">Tümü</option>
                            <option value="Bağlar">Bağlar</option>
                            <option value="Yenişehir">Yenişehir</option>
                            <option value="Kayapınar">Kayapınar</option>
                        </select>
                    </div>

                    <!-- Sıfırlama Butonu -->
                    <button onclick="resetFilters()" class="w-full py-2.5 bg-slate-100 hover:bg-slate-200 text-slate-700 font-semibold rounded-lg text-xs transition duration-150 mt-2">
                        <i class="fa-solid fa-rotate-left mr-1"></i> Filtreleri Temizle
                    </button>
                </div>
            </div>
        </aside>

        <!-- Sağ İlan Listeleme Alanı (Grid) -->
        <main class="flex-1">
            <!-- Loading Animasyonu -->
            <div id="loadingState" class="text-center py-24">
                <i class="fa-solid fa-circle-notch animate-spin text-slate-950 text-3xl mb-4"></i>
                <p class="text-slate-400 text-xs">Güncel portföy yükleniyor, lütfen bekleyin...</p>
            </div>

            <!-- İlan Kartları Grid Yapısı -->
            <div id="listingsGrid" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6 hidden">
                <!-- Kartlar JavaScript ile buraya eklenecektir -->
            </div>

            <!-- Sonuç Bulunamadı Mesajı -->
            <div id="noResults" class="text-center py-24 hidden">
                <i class="fa-regular fa-folder-open text-slate-200 text-5xl mb-4"></i>
                <p class="text-slate-500 text-sm font-medium">Arama kriterlerinize uygun ilan bulunamadı.</p>
            </div>
        </main>

    </div>

    <!-- JavaScript - Supabase Bağlantısı ve Veri Filtreleme -->
    <script>
        // Lütfen bu alanları kendi Supabase bilgileriniz ile güncelleyin
        const SUPABASE_URL = "https://vabkxnntjrqrvvjtdcod.supabase.co/rest/v1/"; 
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZhYmt4bm50anJxcnZ2anRkY29kIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMzOTYxODcsImV4cCI6MjA5ODk3MjE4N30.qIt3Y92zHAgyrLAxf2L7PnzOf3AbYlktIQ3mQKN5uPA";

        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        async function fetchListings() {
            document.getElementById('loadingState').classList.remove('hidden');
            document.getElementById('listingsGrid').classList.add('hidden');
            document.getElementById('noResults').classList.add('hidden');

            try {
                // listings, agents ve images tablolarını ilişkilendirerek çekme
                let query = supabase.from('listings').select('*, agents(*), images(image_url)');

                const keyword = document.getElementById('searchKeyword').value.trim();
                const processType = document.getElementById('filterProcess').value;
                const propertyType = document.getElementById('filterProperty').value;
                const district = document.getElementById('filterDistrict').value;

                if (processType) query = query.eq('process_type', processType);
                if (propertyType) query = query.eq('property_type', propertyType);
                if (district) query = query.eq('district', district);
                
                // İlan kodu veya başlığa göre filtreleme
                if (keyword) {
                    if (!isNaN(keyword)) {
                        query = query.eq('id', parseInt(keyword, 10));
                    } else {
                        query = query.ilike('title', `%${keyword}%`);
                    }
                }

                const { data: listings, error } = await query;

                if (error) throw error;

                const grid = document.getElementById('listingsGrid');
                grid.innerHTML = '';

                if (!listings || listings.length === 0) {
                    document.getElementById('loadingState').classList.add('hidden');
                    document.getElementById('noResults').classList.remove('hidden');
                    return;
                }

                listings.forEach(listing => {
                    const coverImage = (listing.images && listing.images.length > 0) 
                        ? listing.images[0].image_url 
                        : "https://images.unsplash.com/photo-1564013799919-ab600027ffc6?auto=format&fit=crop&w=800&q=80";

                    const formattedPrice = new Intl.NumberFormat('tr-TR').format(listing.price);

                    const cardHtml = `
                        <div class="bg-white rounded-xl border border-slate-200 overflow-hidden shadow-sm hover:shadow-md transition-all duration-300 transform hover:-translate-y-1 flex flex-col">
                            <!-- İlan Görseli -->
                            <div class="relative aspect-[4/3] bg-slate-100 overflow-hidden">
                                <img src="${coverImage}" alt="${listing.title}" class="w-full h-full object-cover transition-transform duration-500 hover:scale-105">
                                <span class="absolute top-3 left-3 bg-white/95 backdrop-blur text-slate-900 text-[10px] font-bold tracking-wider px-2.5 py-1 rounded-full shadow-sm uppercase">${listing.property_type}</span>
                                <span class="absolute top-3 right-3 bg-slate-900 text-white text-[10px] font-bold tracking-wider px-3 py-1 rounded-full shadow-sm uppercase">${listing.process_type}</span>
                            </div>
                            
                            <!-- İlan Detayları -->
                            <div class="p-5 flex-1 flex flex-col gap-3">
                                <div class="flex items-center justify-between text-[11px] text-slate-400 font-semibold tracking-wide">
                                    <span>İlan No: ${listing.id}</span>
                                    ${listing.eids_verified ? '<span class="text-emerald-600"><i class="fa-solid fa-circle-check mr-1"></i>EIDS Aktif</span>' : ''}
                                </div>
                                <h3 class="font-bold text-slate-900 leading-snug line-clamp-2 text-sm h-10">${listing.title}</h3>
                                <div class="text-xs text-slate-500 flex items-center gap-1.5">
                                    <i class="fa-solid fa-map-marker-alt text-slate-400 text-[10px]"></i>
                                    <span>${listing.city} / ${listing.district || ''} / ${listing.neighborhood || ''}</span>
                                </div>
                                
                                <!-- Özellikler -->
                                <div class="flex items-center gap-2 text-[11px] text-slate-600 mt-auto pt-3 border-t border-slate-100">
                                    <span class="bg-slate-50 px-2 py-1 rounded border border-slate-100"><i class="fa-solid fa-door-open text-slate-400 mr-1"></i> ${listing.rooms || 'N/A'}</span>
                                    <span class="bg-slate-50 px-2 py-1 rounded border border-slate-100"><i class="fa-solid fa-ruler-combined text-slate-400 mr-1"></i> ${listing.m2 || '0'} m²</span>
                                    <span class="bg-slate-50 px-2 py-1 rounded border border-slate-100"><i class="fa-solid fa-building text-slate-400 mr-1"></i> ${listing.building_age || '0'} Yıl</span>
                                </div>

                                <!-- Fiyat ve Detay Butonu -->
                                <div class="flex items-center justify-between pt-3 border-t border-slate-100 mt-2">
                                    <span class="text-base font-extrabold text-slate-900">${formattedPrice} ₺</span>
                                    <a href="detail.html?id=${listing.id}" class="text-xs font-bold text-slate-900 hover:text-amber-600 transition duration-150">İncele <i class="fa-solid fa-chevron-right text-[9px] ml-1"></i></a>
                                </div>
                            </div>
                        </div>
                    `;
                    grid.innerHTML += cardHtml;
                });

                document.getElementById('loadingState').classList.add('hidden');
                grid.classList.remove('hidden');

            } catch (error) {
                console.error("Veri çekme hatası:", error.message);
                document.getElementById('loadingState').classList.add('hidden');
                document.getElementById('noResults').classList.remove('hidden');
            }
        }

        function resetFilters() {
            document.getElementById('searchKeyword').value = '';
            document.getElementById('filterProcess').value = '';
            document.getElementById('filterProperty').value = '';
            document.getElementById('filterDistrict').value = '';
            fetchListings();
        }

        window.onload = fetchListings;
    </script>
</body>
</html>
